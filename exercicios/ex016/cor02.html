<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /*configuração globais da css*/
            height: 100%;
        }
        body {
            background-image: linear-gradient(to right,  #3198e2 20%, #6d59d0, #b93590 30%, #e33f5f, #fdd579 50%);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>   
</body>
</html>
