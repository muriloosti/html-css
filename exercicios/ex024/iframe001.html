<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe {
            width: 400px;
            height: 400px;
            border: 1px dashed black;
        }
    </style>
</head>
<body>
    <!--o tamanho padrão de um iframe é de 300x150px-->
    <h1>Testando o uso de iframe</h1>  
    <p>
        acessando o site do 
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500px" scolling="no">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em video</a>
        </iframe>
       
       curso em vídeo para aprender a programar
    </p>

    <p>
        o repositório do guanabara 

        <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="500px" width="500px">
            no <a href="https://gustavoguanabara.github.io" target="_blank">github</a>   
        </iframe>
        
        também é bem legal 
    </p>
</body>
</html>
